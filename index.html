<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <title>Ardenaline Race</title>

  <!-- MOBILE VIEWPORT -->
  <meta name="viewport"
        content="viewport-fit=cover,width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,minimal-ui=true"/>

  <!-- IOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">

  <!-- ANDROID -->
  <meta name="mobile-web-app-capable" content="yes">

  <!-- RENDER -->
  <meta name="renderer" content="webkit"/>
  <meta name="force-rendering" content="webkit"/>

  <!-- IE EDGE -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>

  <!-- TAP -->
  <meta name="msapplication-tap-highlight" content="no">

  <!-- FULLSCREEN -->
  <meta name="full-screen" content="yes"/>
  <meta name="x5-fullscreen" content="true"/>
  <meta name="360-fullscreen" content="true"/>

  <!-- APP MODE -->
  <meta name="x5-page-mode" content="app">

  <!-- ORIENTATION -->
  <meta name="screen-orientation" content="">
  <meta name="x5-orientation" content="">

  <!-- FAVICON -->
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
  <link rel="manifest" href="./site.webmanifest">

  <!-- STYLES -->
  <link rel="stylesheet" type="text/css" href="./screen/screen.css"/>
  <link rel="stylesheet" type="text/css" href="./style.css"/>

</head>

<body style="overflow:hidden; margin:0; padding:0; background:#000;">

  <!-- FULLSCREEN GUIDE -->

  <div id="swipe-up-full-screen"
       style="visibility:hidden; display:block;">

      <div class="swipe-up-instruction">

          <div class="swipe-up-finger">
              <img src="./swipe-up-icon.png">
          </div>

          <div class="tips-text">
              Swipe up to enter fullscreen mode
          </div>

      </div>
  </div>

  <!-- ROTATE DEVICE -->

  <div id="portrait-to-landscape"
       style="display:none;">

      <div class="portrait-gif">
          <img src="./rotate-device.gif">
      </div>

      <div class="portrait-text">
          Please rotate your device to landscape mode
      </div>

  </div>

  <div id="landscape-to-portrait"
       style="display:none;">

      <div class="landscape-gif">
          <img src="./rotate-device.gif">
      </div>

      <div class="landscape-text">
          Please rotate your device to portrait mode
      </div>

  </div>

  <!-- GAME -->

  <div id="GameDiv"
       cc_exact_fit_screen="true">

      <div id="Cocos3dGameContainer">

          <canvas id="GameCanvas"
                  oncontextmenu="event.preventDefault()"
                  tabindex="99">
          </canvas>

      </div>
  </div>

  <!-- POLYFILLS -->
  <script src="src/polyfills.bundle.js"
          charset="utf-8">
  </script>

  <!-- SYSTEM -->
  <script src="src/system.bundle.js"
          charset="utf-8">
  </script>

  <!-- IMPORT MAP -->
  <script src="src/import-map.json"
          type="systemjs-importmap"
          charset="utf-8">
  </script>

  <!-- GAME ENTRY -->
  <script>
      System.import('./index.js')
      .catch(function(err) {

          console.error(err);

      });
  </script>

  <!-- GLOBAL -->
  <script src="public/global-deps-bundle.js"
          charset="utf-8">
  </script>

  <!-- SCREEN CONTROLLER -->
  <script src="screen/screen.js"
          charset="utf-8">
  </script>
<script>
(function () {

    let lastTap = 0;

    async function enterFullscreen() {

        const elem = document.documentElement;

        try {

            if (!document.fullscreenElement) {

                if (elem.requestFullscreen) {
                    await elem.requestFullscreen();
                }
                else if (elem.webkitRequestFullscreen) {
                    await elem.webkitRequestFullscreen();
                }
                else if (elem.msRequestFullscreen) {
                    await elem.msRequestFullscreen();
                }

            }

        } catch (e) {

            console.log("Fullscreen failed:", e);

        }

    }

    document.addEventListener("touchend", function (event) {

        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTap;

        if (tapLength < 300 && tapLength > 0) {

            enterFullscreen();

            event.preventDefault();

        }

        lastTap = currentTime;

    }, false);

})();
</script>
<script crossorigin="anonymous"
src="https://connect.facebook.net/en_US/sdk.js"></script>
</body>
</html>
